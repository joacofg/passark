services:
  postgres:
    image: postgres:16-alpine
    container_name: passark-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    image: python:3.12-slim
    container_name: passark-backend
    working_dir: /workspace/backend
    command:
      - sh
      - -c
      - |
        pip install --no-cache-dir -e .[dev] && \
        alembic upgrade head && \
        uvicorn app.main:app --host 0.0.0.0 --port ${BACKEND_PORT:-8000}
    env_file:
      - .env
    environment:
      PASSARK_ENV: ${PASSARK_ENV}
      DATABASE_URL: ${DATABASE_URL}
      BACKEND_PORT: ${BACKEND_PORT}
      AUTH_BOOTSTRAP_ADMIN_EMAIL: ${AUTH_BOOTSTRAP_ADMIN_EMAIL}
      AUTH_BOOTSTRAP_ADMIN_PASSWORD: ${AUTH_BOOTSTRAP_ADMIN_PASSWORD}
      AUTH_SESSION_COOKIE_NAME: ${AUTH_SESSION_COOKIE_NAME}
      AUTH_SESSION_COOKIE_SECURE: ${AUTH_SESSION_COOKIE_SECURE}
      AUTH_SESSION_COOKIE_SAMESITE: ${AUTH_SESSION_COOKIE_SAMESITE}
      AUTH_SESSION_COOKIE_DOMAIN: ${AUTH_SESSION_COOKIE_DOMAIN}
      AUTH_SESSION_TTL_HOURS: ${AUTH_SESSION_TTL_HOURS}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "from urllib.request import urlopen; import sys; sys.exit(0 if urlopen('http://127.0.0.1:${BACKEND_PORT:-8000}/api/v1/health').status == 200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - ./backend:/workspace/backend

  frontend:
    image: node:20-alpine
    container_name: passark-frontend
    working_dir: /workspace/frontend
    command:
      - sh
      - -c
      - |
        npm install && \
        npm run dev
    env_file:
      - .env
    environment:
      PASSARK_ENV: ${PASSARK_ENV}
      FRONTEND_PORT: ${FRONTEND_PORT}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:${FRONTEND_PORT:-3000} >/dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./frontend:/workspace/frontend

volumes:
  postgres-data:
