services:
  postgres:
    image: postgres:16-alpine
    container_name: passark-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    image: python:3.12-slim
    container_name: passark-backend
    working_dir: /workspace/backend
    command:
      - sh
      - -c
      - |
        echo "Backend scaffold will be added in T02."
        sleep infinity
    env_file:
      - .env
    environment:
      PASSARK_ENV: ${PASSARK_ENV}
      DATABASE_URL: ${DATABASE_URL}
      BACKEND_PORT: ${BACKEND_PORT}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/workspace/backend

  frontend:
    image: node:20-alpine
    container_name: passark-frontend
    working_dir: /workspace/frontend
    command:
      - sh
      - -c
      - |
        echo "Frontend scaffold will be added in T03."
        sleep infinity
    env_file:
      - .env
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/workspace/frontend

volumes:
  postgres-data:
